submission:
  progress_word_target: 30
  update_types:
    nothing_to_report:
      duration_minutes: 0
      questions_required: false
    short_update:
      duration_minutes: 10
      questions_required: true
    deep_dive:
      duration_minutes: 30
      questions_required: true

reminders:
  - name: first_reminder
    weekday: Monday
    time: "08:00"
    channel: browser
  - name: gentle_missing_update_reminder
    weekday: Tuesday
    time: "04:00"
    channel: browser
    only_if_missing_update: true
  - name: agenda_cutoff
    weekday: Wednesday
    time: "08:00"
    action: mark_missing_as_not_submitted_and_build_agenda

permissions:
  member:
    - edit_own_update
    - review_own_theme_dashboard
  coordinator:
    - manage_own_theme
    - skip_own_theme_meeting
    - send_missing_update_reminders_for_own_theme
    - add_remove_members_for_own_theme
  pi:
    - review_all_theme_dashboards
    - manage_all_theme_meetings
    - skip_any_theme_meeting
    - change_coordinator_roles
  administrator:
    - all_permissions
