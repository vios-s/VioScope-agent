services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vioscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vioscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vioscope_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vioscope}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
