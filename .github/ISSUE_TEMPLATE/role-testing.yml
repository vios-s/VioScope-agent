name: Role-based testing report
description: Report a testing issue for member, coordinator, PI, or admin workflows.
title: "[Role test]: "
body:
  - type: markdown
    attributes:
      value: Please do not include secrets, tokens, or private lab content in public issues. Mark private content below if the report needs private follow-up.

  - type: dropdown
    id: role
    attributes:
      label: Role
      description: Which role were you testing?
      options:
        - member
        - coordinator
        - PI
        - admin
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page
      description: Which page or view were you testing?
      placeholder: e.g. Operations console, Alerts, Shared sessions
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: What did you do?
      placeholder: |
        1. Sign in as ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop screenshots or recordings here if useful.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect testing or use?
      options:
        - blocker
        - annoying
        - polish
    validations:
      required: true

  - type: dropdown
    id: private_content
    attributes:
      label: Contains private content?
      description: Select yes if screenshots, text, names, tokens, internal data, or lab content appear in this report.
      options:
        - "no"
        - "yes"
    validations:
      required: true
